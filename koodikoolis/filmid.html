<script>
// Inline script to manage hierarchical tasks and percentages
(function(){
  function getLeafCheckboxes(container) {
    return Array.from(container.querySelectorAll('input.task-checkbox'));
  }

  function computePercent(container) {
    const leaves = getLeafCheckboxes(container);
    if (!leaves.length) return 0;
    const checked = leaves.filter(cb => cb.checked).length;
    return Math.round((checked / leaves.length) * 100);
  }

  function updatePercentSpan(span, percent) {
    if (span) span.textContent = percent + '%';
  }

  // Update all group percent displays
  function updateAll() {
    // Update per-week and per-module and main
    const weekPercents = document.querySelectorAll('.group-item .group .group-item'); // not needed, we'll traverse groups

    // For each group checkbox, compute percent for its containing group element
    const groupCheckboxes = Array.from(document.querySelectorAll('input.group-checkbox'));
    groupCheckboxes.forEach(gcb => {
      const groupElem = gcb.closest('.group-item') || gcb.closest('.group') || document.getElementById('main-group');
      // Determine container to compute leaves: the group element's subtree after the heading
      let container = groupElem;
      if (!container) container = document.getElementById('main-group');
      const percent = computePercent(container);
      // find the percent span next to this checkbox
      const span = container.querySelector('#percent-' + gcb.id) || gcb.parentElement.querySelector('.group-percent');
      updatePercentSpan(span, percent);

      // update group checkbox checked/indeterminate state based on leaves
      const leaves = getLeafCheckboxes(container);
      const checkedLeaves = leaves.filter(cb => cb.checked).length;
      if (!leaves.length) {
        gcb.checked = false;
        gcb.indeterminate = false;
      } else if (checkedLeaves === leaves.length) {
        gcb.checked = true;
        gcb.indeterminate = false;
      } else if (checkedLeaves === 0) {
        gcb.checked = false;
        gcb.indeterminate = false;
      } else {
        gcb.checked = false;
        gcb.indeterminate = true;
      }
    });

    // Finally update main percent span
    const mainPercent = computePercent(document.getElementById('main-group'));
    updatePercentSpan(document.getElementById('percent-main'), mainPercent);

    // Also update module-level displays explicitly
    updatePercentSpan(document.getElementById('percent-module1'), computePercent(document.querySelector('#module1').closest('.group-item')));
    updatePercentSpan(document.getElementById('percent-module2'), computePercent(document.querySelector('#module2').closest('.group-item')));

  }

  // When a group checkbox is toggled, set all descendant leaves to the same state
  document.addEventListener('change', function(e){
    const target = e.target;
    if (target.classList && target.classList.contains('group-checkbox')) {
      // find group container for this checkbox
      const container = target.closest('.group-item') || target.closest('.group') || document.getElementById('main-group');
      // toggle all descendant task-checkboxes
      const leaves = getLeafCheckboxes(container);
      leaves.forEach(cb => cb.checked = target.checked);
      // Also propagate to nested group-checkboxes to keep UI consistent
      const nestedGroupChecks = Array.from(container.querySelectorAll('input.group-checkbox'));
      nestedGroupChecks.forEach(gc => {
        if (gc !== target) {
          gc.checked = target.checked;
          gc.indeterminate = false;
        }
      });
    }

    // For any change, recompute all percents and parent states
    updateAll();

    // Also notify parent window (index.html) by dispatching a custom event if available
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({type: 'progress-updated'}, '*');
      }
    } catch (err) {
      // ignore cross-origin
    }
  });

  // Initial update on load
  document.addEventListener('DOMContentLoaded', function(){
    updateAll();
  });

})();
</script>
